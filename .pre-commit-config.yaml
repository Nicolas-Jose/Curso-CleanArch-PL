repos:
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: python -m pylint
        language: system
        types: [python]
        args:
          [
            "-rn",
            "-sn",
            "--rcfile=.pylintrc",
            "--load-plugins=pylint.extensions.docparams",
          ]
  - repo: local
    hooks:
      - id: requirements
        name: requirements
        entry: bash -c "venv/Scripts/python -m pip freeze > requirements.txt && git add requirements.txt"
        language: system
        pass_filenames: false
        stages: [commit]
